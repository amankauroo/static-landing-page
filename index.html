  <style>
    * {
      font-family: "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: linear-gradient(135deg, #1e1e1e, #3a3a3a);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1 {
      text-align: center;
      margin-top: 50px;
      color: white;
      text-shadow: 2px 2px 4px #1e1e1e;
    }
    .nav img {
      height: 40px;
      margin-left: 20px;
      border-radius: 10px;
    }

    .nav .quicklinks {
      display: flex;
      justify-content: right;
      gap: 20px;
      margin-right: 20px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 20px;
      transition: 0.5s;
    }

    .nav a:hover {
      background-color: rgb(211, 211, 211);
      color: black;
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      padding: 10px;
      border-radius: 0 0 10px 10px;
    }
    @keyframes fadeSlideDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .nav {
      animation: fadeSlideDown 0.8s ease;
    }
    .hero_section {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      color: white;
      text-shadow: 1px 1px 3px #1e1e1e;
      gap: 40px;
      padding: 40px;
      text-align: left;
    }

    .hero_section img {
      width: 220px;
      height: auto;
      max-height: 320px;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      margin: 0;
      flex-shrink: 0;
    }
    .hero_section-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 600px;
    }
    .hero_section h1 {
      margin: 0 0 16px 0;
      font-size: 2.5rem;
    }
    .hero_section p {
      font-size: 1.2rem;
      margin: 0;
      max-width: 600px;
    }

    footer {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      padding: 24px 60px 16px;
      box-shadow: 0 -4px 40px rgba(0, 0, 0, 0.5);
      border-radius: 20px 20px 0 0;
      margin-top: auto;
      animation: fadeSlideUp 0.8s ease;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      margin-right: 0px;
      align-items: center;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.35);
    }

    .footer-bottom a {
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-bottom a:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    .photo_gallery {
      padding: 20px 24px 60px;
      animation: fadeSlideUp 0.8s ease;
    }

    .gallery-grid {
      column-count: 4;
      column-gap: 18px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      transition:
        transform 0.3s ease,
        box-shadow 0.3s ease;
    }

    .gallery-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 35px rgba(0, 0, 0, 0.35);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      margin: 0;
      border-radius: 0;
    }

    .email_form {
      height: 450px;
      width: 50%;
      align-self: center;
      margin: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      animation: fadeSlideUp 0.8s ease;
    }
    .email_form h1 {
      margin-top: 0;
      color: white;
      text-shadow: 2px 2px 4px #1e1e1e;
    }
    .email_form label {
      display: block;
      margin-top: 20px;
      color: white;
      font-weight: 600;
    }
    .email_form input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .email_form textarea {
      width: 100%;
      height: 200px;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }
    .email_form button {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      background: #9b59b6;
      animation: pulse 2s infinite;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
      transition:
        background-color 0.3s ease,
        box-shadow 0.3s ease;
    }
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(155, 89, 182, 0.7);
      }
      70% {
        box-shadow: 0 0 0 15px rgba(155, 89, 182, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(155, 89, 182, 0);
      }
    }

    .email_form button:hover {
      background: #8e44ad;
      box-shadow: 0 6px 20px rgba(0, 86, 179, 0.5);
    }
  </style>
