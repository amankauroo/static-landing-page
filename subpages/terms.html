<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Terms and Conditions</title>
  </head>
  <style>
    * {
      font-family: "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background: linear-gradient(135deg, #1e1e1e, #3a3a3a);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    h1 {
      text-align: center;
      margin-top: 50px;
      color: white;
      text-shadow: 2px 2px 4px #1e1e1e;
    }
    p {
      max-width: 800px;
      margin: 20px auto;
      color: white;
      line-height: 1.6;
      text-shadow: 1px 1px 3px #1e1e1e;
      padding-left: 20px;
      padding-right: 20px;
    }
    .nav img {
      height: 40px;
      margin-left: 20px;
      border-radius: 10px;
    }

    .nav .quicklinks {
      display: flex;
      justify-content: right;
      gap: 20px;
      margin-right: 20px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 20px;
      transition: 0.5s;
    }

    .nav a:hover {
      background-color: rgb(211, 211, 211);
      color: black;
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      padding: 10px;
      border-radius: 0 0 10px 10px;
      margin-bottom: 40px;
    }
    @keyframes fadeSlideDown {
      from {
        opacity: 0;
        transform: translateY(-40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .nav {
      animation: fadeSlideDown 0.8s ease;
    }

    footer {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      padding: 24px 60px 16px;
      box-shadow: 0 -4px 40px rgba(0, 0, 0, 0.5);
      border-radius: 20px 20px 0 0;
      margin-top: auto;
      animation: fadeSlideUp 0.8s ease;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      margin-right: 0px;
      align-items: center;
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.35);
    }

    .footer-bottom a {
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      transition: color 0.3s;
    }

    .footer-bottom a:hover {
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
  <body>
    <nav class="nav">
      <img src="../assets/logo.png" alt="Logo" />
      <div class="quicklinks">
        <a href="../index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>

    <div class="terms">
      <h1>Terms of Service</h1>
      <p>
        Welcome to CodeBy Nasrdeen! By accessing or using our website, you agree
        to be bound by the following terms and conditions. Please read them
        carefully.
      </p>
    </div>

    <footer>
      <span>© CodeBy Nasrdeen 2026. All rights reserved.</span>
      <div class="footer-bottom">
        <a href="../subpages/privacy.html">Privacy Policy &nbsp;</a> |
        <a href="../subpages/terms.html">&nbsp;Terms of Service</a>
      </div>
    </footer>
  </body>
</html>
